<!DOCTYPE html>
<html>
<head>
    <title>Bus Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; }
        .busIcon {
            font-family: Arial, sans-serif;
            font-size: 14px;
            border: 0.69rem solid;
            border-radius: 0.5rem;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // create bus icon
        var busIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1023/1023362.png',
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });

        var stopIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1042/1042314.png',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // 1. Initialize the map centered on a specific spot
        var map = L.map('map').setView([36.215753, -81.6821169], 15);

        // 2. Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // get stops and store it in a variable
        var stops = {};
        var routes = {};

        // 1. Create a LayerGroup to hold the markers
        var markerGroup = L.layerGroup().addTo(map);

        // create a layer group to hold stops
        var stopGroup = L.layerGroup().addTo(map);

        function showRoute(route) {
            stopGroup.clearLayers();
            routes[route].stops.forEach(function(stopName) {
                let stop = stops[stopName];
                let popup = `<div class='stopIcon'><b>${stop.name}</b><br>${stop.lat}, ${stop.lng}</div>`;
                L.marker([stop.lat, stop.lng], {icon: stopIcon, alt: stop.name + " Stop", autoPanOnFocus: true})
                    .bindPopup(popup)
                    .addTo(stopGroup);
            });
        }

        function updateMap() {
            fetch('/buses')
                .then(response => response.json())
                .then(data => {
                    // 2. Clear existing markers so they don't stack up
                    markerGroup.clearLayers();

                    // 3. Loop through new data and add markers to the group
                    data.forEach(function(m) {
                        let color = String(routes[m.route].color).replace(/^['"]|['"]$/g, '');
                        var popup = `<div class='busIcon' style="border-color: ${color}"><b>Route:</b> ${m.route}<br><b>Next Stops:</b>`;
                        for (let i = 0; i < m.stops.length; i++) {
                            popup += `<br> ${m.stops[i] }<b> ${m.etas[i]}</b>`
                        }
                        popup += `</div>`;
                        L.marker([m.lat, m.lng], {icon: busIcon, alt: m.route + " Bus", autoPanOnFocus: true})
                            .bindPopup(popup)
                            .on('click', function() { showRoute(m.route); })
                            .addTo(markerGroup);
                    });

                    console.log("Map updated at: " + new Date().toLocaleTimeString());
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        Promise.all([
            fetch('/stops').then(response => response.json()).then(data => {
                data.forEach(function(stop) {
                    stops[stop.name] = stop;
                });
            }),

            fetch('/routes').then(response => response.json()).then(data => {
                data.forEach(function(route) {
                    routes[route.name] = route;
                });
            })
        ])
        .then(() => {
            updateMap();
            setInterval(updateMap, 30000);
        })
        .catch(error => console.error('Error fetching data:', error));
    </script>
</body>
</html>
