<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Lot Manager</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --panel:    #f6f8fa;
      --border:   #d0d7de;
      --accent:   #1a7f37;
      --accent2:  #0969da;
      --danger:   #da3633;
      --text:     #24292f;
      --muted:    #57606a;
      --hover:    #f3f4f6;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ─────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -.01em;
    }

    #sidebar-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* Mode strip */
    #mode-strip {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mode-btn {
      flex: 1;
      padding: 7px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .mode-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .mode-btn.danger.active { background: var(--danger); border-color: var(--danger); color: #fff; }

    /* Map view selector */
    #map-view-strip {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
    }

    #map-view-select {
      flex: 1;
      padding: 8px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
    }

    #map-view-select:hover {
      border-color: var(--accent2);
      background: var(--hover);
    }

    #map-view-select:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.1);
    }

    /* Lot list */
    #lot-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    #lot-list-wrap::-webkit-scrollbar { width: 4px; }
    #lot-list-wrap::-webkit-scrollbar-track { background: transparent; }
    #lot-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .lot-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .lot-card:hover { border-color: var(--accent2); background: var(--hover); }
    .lot-card.selected { border-color: var(--accent); background: var(--hover); }

    .lot-card-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      padding-right: 48px;
    }
    .lot-card-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .lot-card-meta span { color: var(--accent); }

    .lot-card-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .15s;
    }
    .lot-card:hover .lot-card-actions { opacity: 1; }

    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all .15s;
    }
    .icon-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--hover); }
    .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    .no-lots {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 16px;
      line-height: 1.6;
    }
    .no-lots strong { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }

    /* Sidebar footer */
    #sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    #sidebar-footer #lot-count { color: var(--accent); }

    /* ── Map ─────────────────────────────────────────────────── */
    #map { flex: 1; z-index: 0; }

    /* ── Modal ───────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 360px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
      animation: modal-in .2s ease;
    }
    @keyframes modal-in { from { transform: scale(.96) translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

    #modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #modal-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    #modal-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    #modal-close:hover { border-color: var(--danger); color: var(--danger); }

    #modal-body { padding: 20px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
     .field input:focus,
     .field select:focus { border-color: var(--accent2); }

     .field select[multiple] {
       min-height: 100px;
       padding: 8px;
     }

     .field select[multiple] option {
       padding: 4px;
       line-height: 1.5;
     }

     .field select[multiple] option:checked {
       background: var(--accent2) linear-gradient(var(--accent2), var(--accent2));
       color: white;
     }

    .btn {
      flex: 1;
      padding: 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel { background: transparent; color: var(--muted); }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn-save:hover { filter: brightness(1.1); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 3000;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--accent); }
    #toast.error   { border-color: var(--danger); }

    /* Leaflet draw toolbar tweak for light map */
    .leaflet-draw-toolbar a { background-color: #ffffff !important; border-color: var(--border) !important; color: var(--text) !important; }
    .leaflet-draw-toolbar a:hover { background-color: var(--hover) !important; }
    .leaflet-bar a, .leaflet-bar a:hover { background-color: #ffffff; border-color: var(--border); color: var(--text); }

    /* Status bar on map */
    #map-status {
      position: absolute;
      bottom: 28px;
      right: 16px;
      z-index: 800;
      background: rgba(255,255,255,.88);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      pointer-events: none;
    }
    #map-status span { color: var(--accent2); }

    /* Tabs */
    #modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Scrollable content container */
    #modal > div:not(#modal-header):not(#modal-footer):not(#modal-tabs) {
      overflow-y: auto;
      flex: 1;
    }

    .tab-content {
      display: none;
      padding: 20px;
    }

    .tab-content.active { display: block; }

    #modal-footer {
      padding: 20px 20px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    /* Schedules list */
    .schedules-list {
      margin-bottom: 16px;
    }

    .schedule-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .schedule-info {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .schedule-actions {
      display: flex;
      gap: 4px;
    }

    .schedule-btn {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      transition: all .15s;
    }

    .schedule-btn:hover { border-color: var(--text); color: var(--text); }
    .schedule-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    .add-schedule-btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
    }

    .add-schedule-btn:hover { border-color: var(--accent); background: var(--hover); }

    .schedule-form {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .schedule-form .field { margin-bottom: 10px; }

    .schedule-form-actions {
      display: flex;
      gap: 6px;
    }

    .schedule-form-actions button {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
    }

    .schedule-form-actions .save { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .schedule-form-actions .save:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="eyebrow">Lot Manager</div>
      <h1>Parking Lots</h1>
      <p>Draw polygons on the map to define lots. Hover for info.</p>
    </div>

    <div id="mode-strip">
      <button class="mode-btn" id="btn-edit" title="Edit existing lots">✎ Edit</button>
      <button class="mode-btn danger" id="btn-delete" title="Delete lots">✕ Delete</button>
    </div>

    <div id="map-view-strip">
      <select id="map-view-select" title="Choose map view">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="satellite">Satellite</option>
        <option value="terrain">Terrain</option>
      </select>
    </div>

    <div id="lot-list-wrap">
      <div class="no-lots" id="empty-state">
        <strong>No lots yet</strong>
        Click "Draw" then trace a polygon on the map to add a parking lot.
      </div>
      <div id="lot-list"></div>
    </div>

    <div id="sidebar-footer">
      <span>TOTAL LOTS</span>
      <span id="lot-count">0</span>
    </div>
  </aside>

  <!-- ── Map ── -->
  <div id="map"></div>
  <div id="map-status">Lat <span id="s-lat">—</span> &nbsp; Lng <span id="s-lng">—</span></div>

</div>

<!-- ── Modal ── -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <span id="modal-title">New Parking Lot</span>
      <button id="modal-close">✕</button>
    </div>

    <div id="modal-tabs">
      <button class="tab-btn active" data-tab="info">Info</button>
      <button class="tab-btn" data-tab="schedules">Schedules</button>
    </div>

    <div id="modal-content" style="overflow-y: auto; flex: 1;">
      <div id="tab-info" class="tab-content active">
        <div class="field">
          <label>Lot Name</label>
          <input type="text" id="f-name" placeholder="e.g. Library Lot A" />
        </div>
        <div class="field">
          <label>Number of Spaces</label>
          <input type="number" id="f-spaces" value="15" min="0" />
        </div>
         <div class="field">
           <label>Default Tier (select multiple)</label>
           <select id="f-tier" multiple>
             <option value="AppState Faculty">AppState Faculty</option>
             <option value="Private">Private</option>
             <option value="AppState Parking Pass">AppState Parking Pass</option>
             <option value="Free">Free</option>
             <option value="Game Day Parking Pass">Game Day Parking Pass</option>
             <option value="Meter">Meter</option>
             <option value="Cash Payments Only">Cash Payments Only</option>
             <option value="Event Only">Event Only</option>
           </select>
         </div>
        <div class="field">
          <label>Owner</label>
          <input type="text" id="f-owner" value="AppState" />
        </div>
        <div class="field" style="display: flex; align-items: center; margin-bottom: 16px;">
          <input type="checkbox" id="f-visible" style="width: auto; margin-right: 8px;" />
          <label style="margin-bottom: 0; color: var(--text);">Visible</label>
        </div>
      </div>

      <div id="tab-schedules" class="tab-content">
        <div style="margin-bottom: 16px;">
          <strong style="font-size: 12px; color: var(--accent); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; letter-spacing: .08em;">Free Parking Schedules</strong>
          <div id="free-schedules-list" class="schedules-list" style="margin-top: 10px;"></div>
          <button class="add-schedule-btn" id="add-free-btn">+ Add Free Schedule</button>
        </div>

        <div>
          <strong style="font-size: 12px; color: var(--accent); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; letter-spacing: .08em;">Special Parking Schedules</strong>
          <div id="special-schedules-list" class="schedules-list" style="margin-top: 10px;"></div>
          <button class="add-schedule-btn" id="add-special-btn">+ Add Special Schedule</button>
        </div>
      </div>
    </div>

    <div id="modal-footer">
      <button class="btn btn-cancel" id="btn-modal-cancel">Cancel</button>
      <button class="btn btn-save"   id="btn-modal-save">Save Lot</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────
  const CENTER = [36.215777, -81.679573];
  const ZOOM   = 16;

  // ── Map init ──────────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView(CENTER, ZOOM);

  // ── Tile layer definitions ────────────────────────────────────────────────
  const tileLayers = {
    light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      maxZoom: 20,
    }),
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      maxZoom: 20,
    }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '&copy; Esri &copy; Digital Globe &copy; GeoEye &copy; Earthstar Geographics',
      maxZoom: 20,
    }),
    terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; OpenTopoMap',
      maxZoom: 20,
    }),
  };

  // Add initial light layer
  let currentTileLayer = tileLayers.light;
  currentTileLayer.addTo(map);

  // Status bar lat/lng
  map.on('mousemove', e => {
    document.getElementById('s-lat').textContent = e.latlng.lat.toFixed(6);
    document.getElementById('s-lng').textContent = e.latlng.lng.toFixed(6);
  });

  // ── Draw layers ───────────────────────────────────────────────────────────
  const drawnItems = new L.FeatureGroup().addTo(map);

  const drawControl = new L.Control.Draw({
    draw: {
      polygon:   { shapeOptions: { color: '#1a7f37', fillColor: '#1a7f37', fillOpacity: .25, weight: 2 } },
      polyline:  false,
      rectangle: false,
      circle:    false,
      circlemarker: false,
      marker:    false,
    },
    edit: {
      featureGroup: drawnItems,
      edit: { selectedPathOptions: { color: '#58a6ff', fillOpacity: .35 } },
      remove: true,
    },
  });
  map.addControl(drawControl);

  // ── State ─────────────────────────────────────────────────────────────────
  // lotId → { layer, data }
  const lots = {};
  let pendingLayer  = null;   // layer awaiting modal save
  let editingLotId  = null;   // lot being edited in modal
  let editingScheduleId = null; // schedule being edited
  let editingScheduleType = null; // 'free' or 'special'

  // ── Helpers ───────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 2600);
  }

  function latlngsToCoords(latlngs) {
    // Leaflet polygon: array of LatLng or array-of-arrays for holes
    const ring = Array.isArray(latlngs[0]) ? latlngs[0] : latlngs;
    return ring.map(ll => [ll.lat ?? ll[0], ll.lng ?? ll[1]]);
  }

  function coordsToLatLngs(coords) {
    return coords.map(c => L.latLng(c[0], c[1]));
  }

  function makeTooltip(name, spaces) {
    return `<div style="font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.7;padding:2px 4px">
      <strong style="font-size:13px;font-family:'DM Sans',sans-serif">${name}</strong><br>
      <span style="color:#57606a">Spaces:</span> <span style="color:#1a7f37">${spaces}</span>
    </div>`;
  }

  function attachLayerEvents(layer, id) {
    layer.bindTooltip(makeTooltip(lots[id].data.name, lots[id].data.spaces), {
      sticky: true, opacity: .96,
      className: 'lot-tooltip',
    });

    layer.on('click', () => {
      openEditModal(id);
    });

    layer.on('mouseover', function () {
      this.setStyle({ fillOpacity: .45 });
    });
    layer.on('mouseout', function () {
      this.setStyle({ fillOpacity: .25 });
    });
  }

  // ── Sidebar render ────────────────────────────────────────────────────────
  function renderSidebar() {
    const ids  = Object.keys(lots);
    const list = document.getElementById('lot-list');
    const empty = document.getElementById('empty-state');
    document.getElementById('lot-count').textContent = ids.length;

    if (ids.length === 0) { list.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    list.innerHTML = ids.map(id => {
      const d = lots[id].data;
      return `<div class="lot-card" data-id="${id}" onclick="flyTo(${id})">
        <div class="lot-card-name">${d.name}</div>
        <div class="lot-card-meta"><span>${d.spaces}</span> spaces</div>
        <div class="lot-card-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openEditModal(${id})" title="Edit">✎</button>
          <button class="icon-btn del" onclick="event.stopPropagation();deleteLot(${id})" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  window.flyTo = function (id) {
    if (!lots[id]) return;
    map.fitBounds(lots[id].layer.getBounds(), { padding: [40, 40] });
    document.querySelectorAll('.lot-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.lot-card[data-id="${id}"]`)?.classList.add('selected');
  };

  // ── API calls ─────────────────────────────────────────────────────────────
  async function apiGet() {
    const r = await fetch('/api/lots');
    return r.json();
  }

  async function apiCreate(name, spaces, coordinates, defaultTier, owner, visible = true) {
    const r = await fetch('/api/lots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, spaces, coordinates, default_tier: defaultTier, owner, visible }),
    });
    if (!r.ok) throw new Error('Create failed');
    return r.json();
  }

  async function apiUpdate(id, name, spaces, coordinates, defaultTier, owner, visible = true) {
    const r = await fetch(`/api/lots/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, spaces, coordinates, default_tier: defaultTier, owner, visible }),
    });
    if (!r.ok) throw new Error('Update failed');
    return r.json();
  }

  async function apiDelete(id) {
    const r = await fetch(`/api/lots/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Delete failed');
    return r.json();
  }

  // Schedule API calls
  async function apiCreateFreeSchedule(lotId, dayOfWeek, startTime, endTime) {
    const r = await fetch('/api/schedules/free', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        parking_lot_id: lotId,
        day_of_week: dayOfWeek,
        start_time: startTime,
        end_time: endTime,
      }),
    });
    if (!r.ok) throw new Error('Create schedule failed');
    return r.json();
  }

  async function apiCreateSpecialSchedule(lotId, date, endDate, startTime, endTime, tier, repeats) {
    const r = await fetch('/api/schedules/special', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        parking_lot_id: lotId,
        date,
        end_date: endDate,
        start_time: startTime,
        end_time: endTime,
        tier,
        repeats,
      }),
    });
    if (!r.ok) throw new Error('Create schedule failed');
    return r.json();
  }

  async function apiUpdateSchedule(scheduleId, data) {
    const r = await fetch(`/api/schedules/${scheduleId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error('Update schedule failed');
    return r.json();
  }

  async function apiDeleteSchedule(scheduleId) {
    const r = await fetch(`/api/schedules/${scheduleId}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Delete schedule failed');
    return r.json();
  }

  // ── Load existing lots on page load ──────────────────────────────────────
  async function loadLots() {
    const data = await apiGet();
    data.forEach(d => addLotToMap(d));
    renderSidebar();
  }

  function addLotToMap(d) {
    const latlngs = coordsToLatLngs(d.coordinates);
    const layer = L.polygon(latlngs, {
      color: '#1a7f37', fillColor: '#1a7f37', fillOpacity: .25, weight: 2,
    }).addTo(drawnItems);

    lots[d.id] = { layer, data: d };
    attachLayerEvents(layer, d.id);
  }

  // ── Draw: polygon created ─────────────────────────────────────────────────
  map.on(L.Draw.Event.CREATED, function (e) {
    pendingLayer = e.layer;
    editingLotId = null;
    openModal('New Parking Lot', '', '20', 'AppState Faculty', 'AppState');
  });

  // ── Draw: polygon edited ──────────────────────────────────────────────────
  map.on(L.Draw.Event.EDITED, async function (e) {
    const layers = e.layers;
    const updates = [];
    layers.eachLayer(layer => {
      // find id by layer reference
      const id = Object.keys(lots).find(k => lots[k].layer === layer);
      if (id) updates.push({ id, layer });
    });

    for (const { id, layer } of updates) {
      try {
        const coords = latlngsToCoords(layer.getLatLngs()[0]);
        const d = lots[id].data;
        await apiUpdate(id, d.name, d.spaces, coords, d.default_tier, d.owner, d.visible);
        lots[id].data.coordinates = coords;
        lots[id].layer = layer;
        attachLayerEvents(layer, id);
        toast(`"${d.name}" geometry updated`);
      } catch { toast('Failed to save edit', 'error'); }
    }
  });

  // ── Draw: polygon deleted via draw toolbar ────────────────────────────────
  map.on(L.Draw.Event.DELETED, async function (e) {
    const layers = e.layers;
    layers.eachLayer(async layer => {
      const id = Object.keys(lots).find(k => lots[k].layer === layer);
      if (!id) return;
      try {
        await apiDelete(id);
        delete lots[id];
        renderSidebar();
        toast('Lot deleted');
      } catch { toast('Failed to delete lot', 'error'); }
    });
  });

  // ── Modal ─────────────────────────────────────────────────────────────────
   function openModal(title, name, spaces, defaultTier = '', owner = '', visible = true) {
     document.getElementById('modal-title').textContent  = title;
     document.getElementById('f-name').value   = name;
     document.getElementById('f-spaces').value = spaces;
     // Parse comma-separated tier values and set selected options
     const tierSelect = document.getElementById('f-tier');
     tierSelect.querySelectorAll('option').forEach(opt => opt.selected = false);
     if (defaultTier) {
       const tiers = defaultTier.split(',').map(t => t.trim());
       tiers.forEach(tier => {
         const opt = Array.from(tierSelect.options).find(o => o.value === tier);
         if (opt) opt.selected = true;
       });
     }
     document.getElementById('f-owner').value  = owner;
     document.getElementById('f-visible').checked = visible;
     document.getElementById('modal-overlay').classList.add('open');
     document.getElementById('f-name').focus();

    // Reset to info tab
    switchTab('info');
    renderSchedulesUI();
  }

  function switchTab(tabName) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    // Show selected tab
    const tabEl = document.getElementById(`tab-${tabName}`);
    if (tabEl) tabEl.classList.add('active');

    const btnEl = document.querySelector(`[data-tab="${tabName}"]`);
    if (btnEl) btnEl.classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    pendingLayer  = null;
    editingLotId  = null;
    editingScheduleId = null;
    editingScheduleType = null;
  }

  window.openEditModal = function (id) {
    editingLotId  = id;
    pendingLayer  = null;
    const d = lots[id].data;
    openModal('Edit Parking Lot', d.name, d.spaces, d.default_tier, d.owner, d.visible);
  };

  document.getElementById('modal-close').onclick  = closeModal;
  document.getElementById('btn-modal-cancel').onclick = closeModal;
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  // ── Tab switching ──────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // ── Schedule UI rendering ──────────────────────────────────────────────────
  function renderSchedulesUI() {
    if (editingLotId === null && pendingLayer === null) return;

    const lotData = editingLotId !== null ? lots[editingLotId].data : { free_schedules: [], special_schedules: [] };
    const freeScheds = lotData.free_schedules || [];
    const specialScheds = lotData.special_schedules || [];

    // Render free schedules
    const freeList = document.getElementById('free-schedules-list');
    freeList.innerHTML = freeScheds.map(s => `
      <div class="schedule-item">
        <div class="schedule-info">
          <strong>${s.day_of_week}</strong><br>
          ${s.start_time || '—'} - ${s.end_time || '—'}
        </div>
        <div class="schedule-actions">
          <button class="schedule-btn" onclick="editFreeSchedule(${s.id}, '${s.day_of_week}', '${s.start_time || ''}', '${s.end_time || ''}')">Edit</button>
          <button class="schedule-btn del" onclick="deleteFreeSchedule(${s.id})">Delete</button>
        </div>
      </div>
    `).join('');

    // Render special schedules
    const specialList = document.getElementById('special-schedules-list');
    specialList.innerHTML = specialScheds.map(s => `
      <div class="schedule-item">
        <div class="schedule-info">
          <strong>${s.date}${s.end_date ? ' → ' + s.end_date : ''}</strong><br>
          ${s.start_time || '—'} - ${s.end_time || '—'} <span style="color: var(--accent);">${s.tier}</span><br>
          <span style="font-size: 11px; color: var(--muted);">Repeats: ${s.repeats}</span>
        </div>
        <div class="schedule-actions">
          <button class="schedule-btn" onclick="editSpecialSchedule(${s.id}, '${s.date}', '${s.end_date || ''}', '${s.start_time || ''}', '${s.end_time || ''}', '${s.tier}', '${s.repeats}')">Edit</button>
          <button class="schedule-btn del" onclick="deleteSpecialSchedule(${s.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  window.editFreeSchedule = function (id, day, start, end) {
    editingScheduleId = id;
    editingScheduleType = 'free';
    showFreeScheduleForm(id, day, start, end);
  };

  window.editSpecialSchedule = function (id, date, endDate, start, end, tier, repeats) {
    editingScheduleId = id;
    editingScheduleType = 'special';
    showSpecialScheduleForm(id, date, endDate, start, end, tier, repeats);
  };

  window.deleteFreeSchedule = async function (id) {
    if (!confirm('Delete this free schedule?')) return;
    try {
      await apiDeleteSchedule(id);
      if (editingLotId !== null) {
        lots[editingLotId].data.free_schedules = lots[editingLotId].data.free_schedules.filter(s => s.id !== id);
      }
      renderSchedulesUI();
      toast('Schedule deleted');
    } catch { toast('Failed to delete schedule', 'error'); }
  };

  window.deleteSpecialSchedule = async function (id) {
    if (!confirm('Delete this special schedule?')) return;
    try {
      await apiDeleteSchedule(id);
      if (editingLotId !== null) {
        lots[editingLotId].data.special_schedules = lots[editingLotId].data.special_schedules.filter(s => s.id !== id);
      }
      renderSchedulesUI();
      toast('Schedule deleted');
    } catch { toast('Failed to delete schedule', 'error'); }
  };

  function showFreeScheduleForm(id = null, day = '', start = '', end = '') {
    const freeList = document.getElementById('free-schedules-list');
    const formId = `free-form-${id || 'new'}`;

    // Check if form already exists
    if (document.getElementById(formId)) return;

    const form = document.createElement('div');
    form.id = formId;
    form.className = 'schedule-form';
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    form.innerHTML = `
      <div class="field">
        <label style="font-size: 10px;">Day of Week</label>
        <select class="free-day">
          <option value="">Select a day...</option>
          ${days.map(d => `<option value="${d}" ${day === d ? 'selected' : ''}>${d}</option>`).join('')}
        </select>
      </div>
      <div style="display: flex; gap: 8px;">
        <div class="field" style="flex: 1; margin-bottom: 10px;">
          <label style="font-size: 10px;">Start Time (optional)</label>
          <input type="time" class="free-start" value="${start}" />
        </div>
        <div class="field" style="flex: 1; margin-bottom: 10px;">
          <label style="font-size: 10px;">End Time (optional)</label>
          <input type="time" class="free-end" value="${end}" />
        </div>
      </div>
      <div class="schedule-form-actions">
        <button class="save" onclick="saveFreeSchedule(${id})">Save</button>
        <button onclick="cancelScheduleForm('${formId}')">Cancel</button>
      </div>
    `;

    freeList.appendChild(form);
  }

  function showSpecialScheduleForm(id = null, date = '', endDate = '', start = '', end = '', tier = '', repeats = '') {
    const specialList = document.getElementById('special-schedules-list');
    const formId = `special-form-${id || 'new'}`;

    // Check if form already exists
    if (document.getElementById(formId)) return;

    const form = document.createElement('div');
    form.id = formId;
    form.className = 'schedule-form';
    form.innerHTML = `
      <div style="display: flex; gap: 8px;">
        <div class="field" style="flex: 1;">
          <label style="font-size: 10px;">Date</label>
          <input type="date" class="special-date" value="${date}" />
        </div>
        <div class="field" style="flex: 1;">
          <label style="font-size: 10px;">End Date (optional)</label>
          <input type="date" class="special-end-date" value="${endDate}" />
        </div>
      </div>
      <div style="display: flex; gap: 8px;">
         <div class="field" style="flex: 1;">
           <label style="font-size: 10px;">Tier (select multiple)</label>
           <select class="special-tier" multiple>
             <option value="Private" ${tier === 'Private' ? 'selected' : ''}>Private</option>
             <option value="AppState Faculty" ${tier === 'AppState Faculty' ? 'selected' : ''}>AppState Faculty</option>
             <option value="AppState Parking Pass" ${tier === 'AppState Parking Pass' ? 'selected' : ''}>AppState Parking Pass</option>
             <option value="Free" ${tier === 'Free' ? 'selected' : ''}>Free</option>
             <option value="Game Day Parking Pass" ${tier === 'Game Day Parking Pass' ? 'selected' : ''}>Game Day Parking Pass</option>
             <option value="Meter" ${tier === 'Meter' ? 'selected' : ''}>Meter</option>
             <option value="Cash Payments Only" ${tier === 'Cash Payments Only' ? 'selected' : ''}>Cash Payments Only</option>
             <option value="Event Only" ${tier === 'Event Only' ? 'selected' : ''}>Event Only</option>
           </select>
         </div>
        <div class="field" style="flex: 1;">
          <label style="font-size: 10px;">Repeats</label>
          <select class="special-repeats">
            <option value="None" ${repeats === 'None' ? 'selected' : ''}>None</option>
            <option value="Daily" ${repeats === 'Daily' ? 'selected' : ''}>Daily</option>
            <option value="Weekly" ${repeats === 'Weekly' ? 'selected' : ''}>Weekly</option>
            <option value="Monthly" ${repeats === 'Monthly' ? 'selected' : ''}>Monthly</option>
            <option value="Annually" ${repeats === 'Annually' ? 'selected' : ''}>Annually</option>
          </select>
        </div>
      </div>
      <div style="display: flex; gap: 8px;">
        <div class="field" style="flex: 1; margin-bottom: 10px;">
          <label style="font-size: 10px;">Start Time (optional)</label>
          <input type="time" class="special-start" value="${start}" />
        </div>
        <div class="field" style="flex: 1; margin-bottom: 10px;">
          <label style="font-size: 10px;">End Time (optional)</label>
          <input type="time" class="special-end" value="${end}" />
        </div>
      </div>
      <div class="schedule-form-actions">
        <button class="save" onclick="saveSpecialSchedule(${id})">Save</button>
        <button onclick="cancelScheduleForm('${formId}')">Cancel</button>
      </div>
    `;

    specialList.appendChild(form);
  }

  window.saveFreeSchedule = async function (id) {
    const form = document.querySelector(`#free-form-${id || 'new'}`);
    const day = form.querySelector('.free-day').value.trim();
    const start = form.querySelector('.free-start').value;
    const end = form.querySelector('.free-end').value;

    if (!day) { toast('Day of week is required', 'error'); return; }

    try {
      if (id) {
        // Update existing
        await apiUpdateSchedule(id, { day_of_week: day, start_time: start, end_time: end });
        if (editingLotId !== null) {
          const sched = lots[editingLotId].data.free_schedules.find(s => s.id === id);
          if (sched) {
            sched.day_of_week = day;
            sched.start_time = start;
            sched.end_time = end;
          }
        }
      } else {
        // Create new
        const created = await apiCreateFreeSchedule(editingLotId, day, start, end);
        if (editingLotId !== null) {
          lots[editingLotId].data.free_schedules.push(created);
        }
      }
      renderSchedulesUI();
      toast(id ? 'Schedule updated' : 'Schedule added');
    } catch { toast('Failed to save schedule', 'error'); }
  };

   window.saveSpecialSchedule = async function (id) {
     const form = document.querySelector(`#special-form-${id || 'new'}`);
     const date = form.querySelector('.special-date').value;
     const endDate = form.querySelector('.special-end-date').value;
     // Get selected tier values and join as comma-separated string
     const tierSelect = form.querySelector('.special-tier');
     const selectedTiers = Array.from(tierSelect.selectedOptions).map(opt => opt.value);
     const tier = selectedTiers.join(',');
     const repeats = form.querySelector('.special-repeats').value.trim();
     const start = form.querySelector('.special-start').value;
     const end = form.querySelector('.special-end').value;

     if (!date || !tier || !repeats) { toast('Date, Tier, and Repeats are required', 'error'); return; }

    try {
      if (id) {
        // Update existing
        await apiUpdateSchedule(id, { date, end_date: endDate, start_time: start, end_time: end, tier, repeats });
        if (editingLotId !== null) {
          const sched = lots[editingLotId].data.special_schedules.find(s => s.id === id);
          if (sched) {
            sched.date = date;
            sched.end_date = endDate;
            sched.start_time = start;
            sched.end_time = end;
            sched.tier = tier;
            sched.repeats = repeats;
          }
        }
      } else {
        // Create new
        const created = await apiCreateSpecialSchedule(editingLotId, date, endDate, start, end, tier, repeats);
        if (editingLotId !== null) {
          lots[editingLotId].data.special_schedules.push(created);
        }
      }
      renderSchedulesUI();
      toast(id ? 'Schedule updated' : 'Schedule added');
    } catch { toast('Failed to save schedule', 'error'); }
  };

  window.cancelScheduleForm = function (formId) {
    const form = document.getElementById(formId);
    if (form) form.remove();
  };

  // ── Add schedule button handlers ────────────────────────────────────────────
  document.getElementById('add-free-btn').addEventListener('click', () => {
    showFreeScheduleForm();
  });

  document.getElementById('add-special-btn').addEventListener('click', () => {
    showSpecialScheduleForm();
  });

   document.getElementById('btn-modal-save').onclick = async function () {
     const name   = document.getElementById('f-name').value.trim();
     const spaces = parseInt(document.getElementById('f-spaces').value) || 0;
     // Get selected tier values and join as comma-separated string
     const tierSelect = document.getElementById('f-tier');
     const selectedTiers = Array.from(tierSelect.selectedOptions).map(opt => opt.value);
     const defaultTier = selectedTiers.join(',');
     const owner = document.getElementById('f-owner').value.trim();
     const visible = document.getElementById('f-visible').checked;

     if (!name) { document.getElementById('f-name').focus(); return; }

    if (editingLotId !== null) {
      // ── Update existing lot ──
      try {
        const d    = lots[editingLotId].data;
        const coords = d.coordinates; // geometry unchanged
        const updated = await apiUpdate(editingLotId, name, spaces, coords, defaultTier, owner, visible);
        lots[editingLotId].data = updated;
        // refresh tooltip
        lots[editingLotId].layer.unbindTooltip();
        attachLayerEvents(lots[editingLotId].layer, editingLotId);
        renderSidebar();
        toast(`"${name}" updated`);
        closeModal();
      } catch { toast('Failed to update', 'error'); }

    } else if (pendingLayer) {
      // ── Create new lot
      try {
        const coords  = latlngsToCoords(pendingLayer.getLatLngs()[0]);
        const created = await apiCreate(name, spaces, coords, defaultTier, owner, visible);
        pendingLayer.setStyle({ color: '#1a7f37', fillColor: '#1a7f37', fillOpacity: .25, weight: 2 });
        drawnItems.addLayer(pendingLayer);
        lots[created.id] = { layer: pendingLayer, data: created };
        attachLayerEvents(pendingLayer, created.id);
        renderSidebar();
        toast(`"${name}" saved`);
        closeModal();
      } catch { toast('Failed to save lot', 'error'); }
    }
  };

  // Enter key in modal
  document.getElementById('modal').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-modal-save').click();
    if (e.key === 'Escape') closeModal();
  });

  // ── Delete from sidebar ───────────────────────────────────────────────────
  window.deleteLot = async function (id) {
    if (!lots[id]) return;
    const name = lots[id].data.name;
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      await apiDelete(id);
      drawnItems.removeLayer(lots[id].layer);
      delete lots[id];
      renderSidebar();
      toast(`"${name}" deleted`);
    } catch { toast('Failed to delete', 'error'); }
  };

  // ── Mode buttons ──────────────────────────────────────────────────────────
  // These are visual-only helpers; real draw/edit/delete is via the Leaflet.Draw toolbar.
  // They trigger the corresponding draw toolbar buttons programmatically.
  const modeButtons = {
    edit:   document.getElementById('btn-edit'),
    delete: document.getElementById('btn-delete'),
  };

  function setActiveMode(mode) {
    Object.values(modeButtons).forEach(b => b.classList.remove('active'));
    if (modeButtons[mode]) modeButtons[mode].classList.add('active');
  }

  modeButtons.edit.addEventListener('click', () => {
    setActiveMode('edit');
    const btn = document.querySelector('.leaflet-draw-edit-edit');
    if (btn) btn.click();
  });

  modeButtons.delete.addEventListener('click', () => {
    setActiveMode('delete');
    const btn = document.querySelector('.leaflet-draw-edit-remove');
    if (btn) btn.click();
  });

  // Reset mode button state when draw/edit/delete finishes
  map.on('draw:drawstop draw:editstop draw:deletestop', () => setActiveMode('edit'));

  // ── Map view selector ──────────────────────────────────────────────────────
  document.getElementById('map-view-select').addEventListener('change', (e) => {
    const viewType = e.target.value;
    if (tileLayers[viewType]) {
      // Remove current layer
      map.removeLayer(currentTileLayer);
      // Add new layer
      currentTileLayer = tileLayers[viewType];
      currentTileLayer.addTo(map);
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  loadLots();

})();
</script>
</body>
</html>
